runtime: python311

# 1 worker, 8 threads, 600s timeout — needed for long-running Veo calls (~90s each × 6 concurrent)
entrypoint: python -m gunicorn -b :$PORT -w 1 --threads 8 --timeout 600 main:app

instance_class: F4

handlers:
  - url: /.*
    script: auto

env_variables:
  GCP_PROJECT: "poc-yt-cannes-494105"
  GCS_BUCKET: "poc-yt-cannes"
  FIRESTORE_DB: "drivein-poc"
  TASKS_LOCATION: "us-central1"
  VERTEX_LOCATION: "us-central1"
